<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คุณเป็นสัตว์สายนอนแบบไหน?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#141036;
    --night2:#241a5e;
    --dusk:#4a3b8c;
    --peach:#ff9d6b;
    --gold:#ffd36b;
    --lav:#cbb8ff;
    --cream:#fff4e6;
    --muted:#b8aee0;
    --card:rgba(255,255,255,.055);
    --line:rgba(203,184,255,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Sarabun",sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% -10%, #3a2c78 0%, var(--night2) 42%, var(--night) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:22px 16px 40px;
    overflow-x:hidden;
    position:relative;
  }
  
  .stars,.stars::before,.stars::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1.6px 1.6px at 10% 15%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 25% 35%, #fff, transparent),
      radial-gradient(2px 2px at 45% 10%, #ffe9c2, transparent),
      radial-gradient(1.5px 1.5px at 65% 50%, #fff, transparent),
      radial-gradient(1.8px 1.8px at 85% 25%, #ffe9c2, transparent),
      radial-gradient(1.2px 1.2px at 15% 75%, #fff, transparent),
      radial-gradient(1.4px 1.4px at 55% 85%, #fff, transparent),
      radial-gradient(1.6px 1.6px at 80% 70%, #fff, transparent),
      radial-gradient(1px 1px at 35% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 95% 45%, #fff, transparent),
      radial-gradient(2.5px 2.5px at 70% 20%, #fff, transparent),
      radial-gradient(2.2px 2.2px at 73% 23%, #fff, transparent),
      radial-gradient(2px 2px at 77% 25%, #fff, transparent),
      radial-gradient(2.2px 2.2px at 81% 29%, #fff, transparent),
      radial-gradient(2.4px 2.4px at 83% 25%, #fff, transparent),
      radial-gradient(2.5px 2.5px at 87% 28%, #fff, transparent),
      radial-gradient(2px 2px at 85% 32%, #fff, transparent);
    background-repeat:no-repeat;
    animation:tw 4s ease-in-out infinite;
  }
  .stars::before{background-position:20px 50px;animation-delay:1.3s;opacity:.8}
  .stars::after{background-position:-40px -30px;animation-delay:2.4s;opacity:.6}
  @keyframes tw{0%,100%{opacity:.35}50%{opacity:1}}

  .app{
    position:relative;z-index:1;
    width:100%;max-width:460px;
  }
  .screen{display:none;animation:rise .45s ease both}
  .screen.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .lang-toggle{
    position:fixed;top:16px;right:16px;z-index:6;
    font-family:"Kanit";font-weight:600;font-size:12.5px;letter-spacing:1px;
    color:var(--gold);background:rgba(255,255,255,.06);border:1px solid var(--line);
    padding:7px 15px;border-radius:20px;cursor:pointer;
    transition:background .15s ease, transform .12s ease;
  }
  .lang-toggle:hover{background:rgba(255,211,107,.14);transform:translateY(-1px)}
  .lang-toggle:active{transform:translateY(0)}

  .moon-glow{filter:drop-shadow(0 0 24px rgba(255,211,107,.5))}
  .moon-big{font-size:76px;line-height:1;text-align:center;animation:float 5s ease-in-out infinite}
  
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  
  .eyebrow{
    text-align:center;font-family:"Kanit";font-weight:600;font-size:13px;letter-spacing:2px;
    color:var(--gold);text-transform:uppercase;margin:18px 0 8px;opacity:.9
  }
  h1{
    font-family:"Kanit";font-weight:700;text-align:center;line-height:1.15;
    font-size:34px;margin-bottom:14px;
  }
  h1 .hl{color:var(--peach)}
  .lede{text-align:center;color:var(--muted);font-size:15.5px;line-height:1.6;max-width:340px;margin:0 auto 20px}
  
  .user-info-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 22px;
  }
  .user-info-form input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--cream);
    font-family: "Sarabun", sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .user-info-form input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(255, 211, 107, 0.3);
  }
  .user-info-form input::placeholder {
    color: var(--muted);
    opacity: 0.8;
  }
  .error-msg {
    color: var(--peach);
    font-size: 13.5px;
    text-align: center;
    font-family: "Kanit";
    margin-top: -4px;
    display: none;
    animation: shake 0.4s ease;
  }
  .error-msg.show {
    display: block;
  }
  @keyframes shake {
    0%, 100% {transform: translateX(0);}
    25% {transform: translateX(-4px);}
    75% {transform: translateX(4px);}
  }

  .btn{
    display:block;width:100%;border:0;cursor:pointer;
    font-family:"Kanit";font-weight:600;font-size:17px;
    color:#241a5e;background:linear-gradient(180deg,var(--gold),var(--peach));
    padding:15px;border-radius:16px;
    box-shadow:0 10px 24px -8px rgba(255,157,107,.6);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 16px 30px -8px rgba(255,157,107,.7)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{
    background:transparent;color:var(--lav);border:1px solid var(--line);
    box-shadow:none;font-size:15px;padding:13px;margin-top:10px;
  }
  .btn.ghost:hover{background:rgba(203,184,255,.08);transform:none}
  .cast{display:flex;justify-content:center;gap:14px;margin-bottom:20px;font-size:26px}
  .cast span{opacity:.85;animation:float 5s ease-in-out infinite}
  .cast span:nth-child(2){animation-delay:.6s}
  .cast span:nth-child(3){animation-delay:1.2s}
  .cast span:nth-child(4){animation-delay:1.8s}

  .prog{margin-bottom:22px}
  .track{position:relative;height:2px;background:var(--line);border-radius:2px;margin:0 6px}
  .fill{position:absolute;left:0;top:0;height:100%;background:var(--gold);border-radius:2px;width:0;transition:width .4s ease;box-shadow:0 0 8px rgba(255,211,107,.6)}
  .orb{
    position:absolute;
    top:50%; 
    font-size:22px;
    transform:translate(-50%, -50%); 
    transition:left .4s ease;
    filter:drop-shadow(0 0 10px rgba(255,211,107,.55))
  }
  
  .qcount{text-align:center;font-family:"Kanit";font-size:12.5px;letter-spacing:1px;color:var(--muted);margin-top:14px}

  .q{
    font-family:"Kanit";font-weight:600;font-size:22px;line-height:1.4;
    text-align:center;margin:6px 0 22px;min-height:62px;
    display:flex;align-items:center;justify-content:center;
  }
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{
    text-align:left;cursor:pointer;
    background:var(--card);border:1px solid var(--line);
    border-radius:15px;padding:15px 16px;font-size:15.5px;line-height:1.45;
    color:var(--cream);font-family:"Sarabun";font-weight:500;
    transition:border-color .15s, background .15s, transform .1s;
    display:flex;gap:12px;align-items:center;
  }
  .opt .dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--dusk);transition:background .15s;margin-top:1px}
  .opt:hover{border-color:var(--peach);background:rgba(255,157,107,.09);transform:translateX(3px)}
  .opt:hover .dot{background:var(--gold)}

  .r-emoji-wrap { animation:pop .5s cubic-bezier(.2,1.4,.5,1) both; text-align:center; }
  .r-emoji{display:inline-block; font-size:88px; line-height:1; animation:float 4s ease-in-out infinite;}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  
  .r-tag{text-align:center;font-family:"Kanit";font-size:12.5px;letter-spacing:1.5px;color:var(--gold);margin:16px 0 4px}
  .r-name{text-align:center;font-family:"Kanit";font-weight:700;font-size:30px;margin-bottom:4px}
  .r-eng{text-align:center;color:var(--muted);font-size:13px;letter-spacing:.5px;margin-bottom:20px}
  .r-body{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:12px}
  .r-body p{font-size:15px;line-height:1.65}
  
  .r-section{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
  .r-label{font-family:"Kanit";font-weight:600;font-size:13px;color:var(--peach);margin-bottom:8px}
  .r-list { list-style-type: disc; padding-left: 20px; font-size: 14.5px; line-height: 1.6; color: var(--cream); }
  .r-list li { margin-bottom: 4px; }

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--gold);color:#241a5e;font-family:"Kanit";font-weight:600;font-size:14px;
    padding:10px 20px;border-radius:30px;opacity:0;transition:.3s;z-index:5;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="stars"></div>
<button class="lang-toggle" id="langToggle" onclick="toggleLang()" aria-label="Switch language">EN</button>

<div class="app">

  <!-- START -->
  <section id="start" class="screen on">
    <div class="moon-big moon-glow">🌙</div>
    <div class="eyebrow" id="eyebrow">แบบทดสอบการนอน</div>
    <h1><span id="h1a">นอนแบบไหน</span><br><span id="h1b">บอกได้ว่าคุณคือ</span><br><span class="hl" id="h1hl">สัตว์อะไร</span></h1>
    <p class="lede" id="lede">ตอบคำถามสั้นๆ 7 ข้อเกี่ยวกับการนอน แล้วมาดูกันว่าคุณคือสัตว์ตัวไหน</p>
    
    <div class="cast"><span>🐓</span><span>🐱</span><span>🦇</span><span>🦉</span></div>
    
    <div class="user-info-form">
      <input type="text" id="userName" placeholder="ชื่อของคุณ">
      <input type="tel" id="userPhone" placeholder="เบอร์โทรศัพท์">
      <div id="formError" class="error-msg">กรุณากรอกชื่อและเบอร์โทรศัพท์</div>
    </div>

    <button class="btn" id="startBtn" onclick="start()">เริ่มเทสต์เลย</button>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="screen">
    <div class="prog">
      <div class="track">
        <div class="fill" id="fill"></div>
        <div class="orb" id="orb" style="left:0">🌙</div>
      </div>
      <div class="qcount" id="qcount"></div>
    </div>
    <div class="q" id="qtext"></div>
    <div class="opts" id="opts"></div>
  </section>

  <!-- RESULT -->
  <section id="result" class="screen">
    <div class="r-emoji-wrap"><div class="r-emoji moon-glow" id="rEmoji"></div></div>
    <div class="r-tag" id="resultTag">คุณคือ</div>
    <div class="r-name" id="rName"></div>
    <div class="r-eng" id="rEng"></div>
    
    <div class="r-body">
      <p id="rDesc"></p>
      
      <div class="r-section">
        <div class="r-label" id="weakLabel">💤 จุดสลบ</div>
        <p id="rWeak"></p>
      </div>

      <div class="r-section">
        <div class="r-label" id="timelineLabel">🗓️ ตารางชีวิตแนะนำ</div>
        <ul id="rTimeline" class="r-list"></ul>
      </div>

      <div class="r-section">
        <div class="r-label" id="tipsLabel">💡 ทริคเพิ่มพลังทำงาน</div>
        <ul id="rTips" class="r-list"></ul>
      </div>
    </div>
    
    <button class="btn" id="shareBtn" onclick="share()">แชร์ผลลัพธ์</button>
    <button class="btn ghost" id="replayBtn" onclick="reset()">เล่นอีกครั้ง</button>
  </section>

</div>

<div class="toast" id="toast">คัดลอกผลแล้ว วางแชร์ได้เลย!</div>

   th:{q:`วันหยุดที่ไม่ต้องตั้งนาฬิกาปลุก คุณตื่นเองกี่โมง?`,a:[`ตี 4–ตี 5 ตื่นเอง นอนต่อไม่ได้แล้ว`,`6–8 โมง ตื่นตามปกติ`,`เกือบเที่ยง หรือบ่ายไปเลย`,`ไม่แน่ แล้วแต่เมื่อคืนหลับกี่โมง`]},
   en:{q:`On a day off with no alarm, what time do you naturally wake up?`,a:[`4–5am — wide awake, can't fall back asleep`,`6–8am — my usual wake-up time`,`Almost noon, or even into the afternoon`,`Varies, depends what time I fell asleep`]}},

  {types:["chicken","cat","bat","owl"],
   th:{q:`ช่วงไหนของวันที่หัวโล่ง ทำงานได้ดีที่สุด?`,a:[`เช้าตรู่ สดที่สุดตอนเช้า`,`สายๆ ถึงบ่าย ค่อยๆ อุ่นเครื่อง`,`กลางคืน ยิ่งดึกยิ่งแล่น`,`บอกไม่ได้ แล้วแต่วัน`]},
   en:{q:`What time of day is your mind clearest and most productive?`,a:[`Early morning — sharpest right after I wake up`,`Late morning to afternoon — I warm up gradually`,`At night — the later it gets, the better I work`,`Hard to say, it changes day to day`]}},

  {types:["chicken","cat","bat","owl"],
   th:{q:`พอถึงบ่ายสามโมง คุณเป็นยังไง?`,a:[`ง่วงจริง เพราะตื่นมาตั้งแต่เช้ามืด`,`ง่วงนิดหน่อย ขอกาแฟหรือชาเย็นสักแก้ว`,`ยังสดอยู่ เพิ่งตื่นได้ไม่นาน`,`แล้วแต่วัน บางวันเพลีย บางวันไหว`]},
   en:{q:`How do you feel around 3pm?`,a:[`Genuinely sleepy, I've been up since dawn`,`A little drowsy, need a coffee or iced tea`,`Still fresh, I only woke up recently`,`Depends on the day, sometimes tired, sometimes fine`]}},

   th:{q:`คืนก่อนวันที่ต้องตื่นไปทำงาน คุณนอนยังไง?`,a:[`หลับง่าย พรุ่งนี้ตื่นเช้าอยู่แล้ว`,`นอนปกติ เล่นมือถือหน่อยแล้วหลับ`,`ยังไม่ง่วง นอนดึกเหมือนเดิม`,`นอนไม่หลับ คิดวนเรื่องพรุ่งนี้`]},
   en:{q:`The night before a work day, how do you sleep?`,a:[`Fall asleep easily, I'm an early riser anyway`,`Normal routine, scroll my phone a bit then doze off`,`Not sleepy yet, stay up late as usual`,`Can't sleep, my mind loops on tomorrow`]}},

  {types:["chicken","cat","bat","owl"],
   th:{q:`พอหัวถึงหมอน อีกกี่นาทีถึงจะหลับ?`,a:[`5 นาที หลับปุ๊บ`,`เล่นมือถือสักพักแล้วค่อยหลับ`,`ยังไม่ง่วง ลุกไปทำอย่างอื่นต่อ`,`นาน คิดโน่นคิดนี่ไม่หยุด`]},
   en:{q:`Once your head hits the pillow, how long until you fall asleep?`,a:[`5 minutes, out like a light`,`Scroll my phone for a while, then drift off`,`Not sleepy yet, get up to do something else`,`A long time, my thoughts won't stop racing`]}}
];

let lang = 'th';
let idx = 0, score = {chicken:0,cat:0,bat:0,owl:0};
let userInfo = {name: "", phone: ""}; 
let userAnswers = []; // Array to store each chosen answer

const $=id=>document.getElementById(id);

function applyStaticText(){
  const s = STR[lang];
  document.documentElement.lang = lang;
  document.title = s.docTitle;
  $("eyebrow").textContent = s.eyebrow;
  $("h1a").textContent = s.h1a;
  $("h1b").textContent = s.h1b;
  $("h1hl").textContent = s.h1hl;
  $("lede").textContent = s.lede;
  $("userName").placeholder = s.namePlaceholder;
  $("userPhone").placeholder = s.phonePlaceholder;
  $("formError").textContent = s.formError;
  $("startBtn").textContent = s.start;
  $("resultTag").textContent = s.resultTag;
  $("weakLabel").textContent = s.weakLabel;
  $("timelineLabel").textContent = s.timelineLabel;
  $("tipsLabel").textContent = s.tipsLabel;
  $("shareBtn").textContent = s.shareBtn;
  $("replayBtn").textContent = s.replayBtn;
  $("toast").textContent = s.toast;
  $("langToggle").textContent = lang==='th' ? 'EN' : 'TH';
}

function toggleLang(){
  lang = lang==='th' ? 'en' : 'th';
  applyStaticText();
  if($("quiz").classList.contains("on")) render();
  if($("result").classList.contains("on") && window._resultKey) renderResult();
}

function start() {
  const nameInput = $("userName").value.trim();
  const phoneInput = $("userPhone").value.trim();
  const errorEl = $("formError");

  if (!nameInput || !phoneInput) {
    errorEl.classList.add("show");
    setTimeout(() => errorEl.classList.remove("show"), 2000);
    return; 
  }

  errorEl.classList.remove("show");
  userInfo.name = nameInput;
  userInfo.phone = phoneInput;
  
  idx=0; 
  score={chicken:0,cat:0,bat:0,owl:0}; 
  userAnswers = []; // Reset answers
  go("quiz"); 
  render(); 
}

function go(id){ document.querySelectorAll(".screen").forEach(sec=>sec.classList.remove("on")); $(id).classList.add("on"); window.scrollTo(0,0); }

function render(){
  const item=Q[idx];
  const s=STR[lang];
  $("qtext").textContent=item[lang].q;
  $("qcount").textContent=s.qWord+" "+(idx+1)+" / "+Q.length;
  const pct=(idx/(Q.length-1))*100;
  $("fill").style.width=pct+"%";
  $("orb").style.left=pct+"%";
  const box=$("opts"); box.innerHTML="";
  
  item[lang].a.forEach((label,i)=>{
    const type=item.types[i];
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML='<span class="dot"></span><span>'+label+'</span>';
    // Passing the actual answer text to the pick function
    b.onclick=()=>pick(type, label);
    box.appendChild(b);
  });
}

function pick(type, answerLabel){
  score[type]++;
  userAnswers.push(answerLabel); // Store the exact text of the answer
  idx++;
  if(idx<Q.length){ render(); }
  else finish();
}

function finish(){
  window._resultKey = Object.keys(score).reduce((a,b)=>score[b]>score[a]?b:a,"chicken");
  renderResult();
  saveDataToSheets(window._resultKey);
  go("result");
}

function renderResult(){
  const t = TYPES[window._resultKey];
  $("rEmoji").textContent = t.emoji;
  $("rName").textContent = t[lang].name;
  $("rEng").textContent = t[lang].eng;
  $("rDesc").textContent = t[lang].desc;
  $("rWeak").textContent = t[lang].weak;

  const timelineBox = $("rTimeline");
  timelineBox.innerHTML = "";
  t[lang].timeline.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    timelineBox.appendChild(li);
  });

  const tipsBox = $("rTips");
  tipsBox.innerHTML = "";
  t[lang].tips.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    tipsBox.appendChild(li);
  });
}

function reset(){
  $("userName").value = "";
  $("userPhone").value = "";
  userInfo = {name: "", phone: ""};
  go("start"); 
}

function share(){
  const winner = window._resultKey;
  if(!winner) return;
  const t = TYPES[winner];
  const s = STR[lang];
  const shareText = `${s.shareIntro} ${t.emoji} ${t[lang].name} (${t[lang].eng})!\n${s.shareCta}`;
  const url = location.href;
  if(navigator.share){
    navigator.share({title:s.docTitle, text:shareText, url:url}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(shareText+"\n"+url).then(toastShow).catch(toastShow);
  } else {
    toastShow();
  }
}
function toastShow(){ const el=$("toast"); el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),1800); }

function saveDataToSheets(resultAnimal) {
  if (GOOGLE_APP_SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") return;

  fetch(GOOGLE_APP_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors', 
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: userInfo.name,
      phone: userInfo.phone,
      animal_result: resultAnimal,
      language: lang,
      answers: userAnswers // Sending the array of 7 answers
    })
  }).catch(error => console.error('Error recording data:', error));
}

applyStaticText();
</script>
